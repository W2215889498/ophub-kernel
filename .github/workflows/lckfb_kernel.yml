name: Compile RK35XX Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version"
        default: "6.1.y"
        type: choice
        options:
          - 6.1.y
          - 6.1.115
          - 5.10.y
          - 5.10.160
      kernel_package:
        description: "Compile package list"
        default: "all"
        type: choice
        options:
          - all
          - dtbs

env:
  TZ: America/New_York
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout tool repo
        uses: actions/checkout@v4

      - name: Prepare environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android ~/.cargo
          sudo -E apt-get update -qq
          
          # 安装依赖，同时压制容器环境下 systemd 的非致命警告
          sudo -E apt-get install -y $(curl -fsSL https://tinyurl.com/ubuntu2204-build-armbian) 2>&1 | \
            grep -v "System has not been booted with systemd" | \
            grep -v "Failed to connect to system scope bus" | \
            grep -v "non-existent unit" || true
            
          sudo -E apt-get clean

      - name: Compile kernel
        uses: ophub/amlogic-s9xxx-armbian@main
        id: compile
        with:
          build_target: kernel
          kernel_source: W2215889498/unifreq-linux-6.1.y-rockchip
          kernel_version: ${{ inputs.kernel_version }}
          kernel_auto: false
          delete_source: true
          kernel_package: ${{ inputs.kernel_package }}
          kernel_sign: "-rk35xx-leegartu"
          kernel_config: kernel-config/release/rk35xx
          silent_log: false

      - name: Check output
        id: check
        if: always()
        run: |
          OUT="/opt/kernel/compile-kernel/output"
          echo "=== Compile outcome: ${{ steps.compile.outcome }} ==="
          ls -la "$OUT" 2>/dev/null || true
          find "$OUT" -type f 2>/dev/null | head -20 || true
          [ -n "$(find "$OUT" -type f 2>/dev/null | head -1)" ] && echo "has_files=true" >> $GITHUB_OUTPUT || echo "has_files=false" >> $GITHUB_OUTPUT

      - name: Upload to Release
        if: steps.check.outputs.has_files == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: kernel_rk35xx_${{ inputs.kernel_version }}
          artifacts: "/opt/kernel/compile-kernel/output/**/*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            - Source: W2215889498/unifreq-linux-6.1.y-rockchip
            - Version: ${{ inputs.kernel_version }}
            - Package: ${{ inputs.kernel_package }}
            - For Rockchip rk3528/rk3566/rk3568 only.
