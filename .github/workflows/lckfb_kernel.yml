name: Compile RK35XX Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version"
        default: "6.1.y"
        type: choice
        options:
          - 6.1.y
          - 6.1.115
          - 5.10.y
          - 5.10.160
      kernel_package:
        description: "Compile package list"
        default: "all"
        type: choice
        options:
          - all
          - dtbs

env:
  TZ: America/New_York
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout tool repo
        uses: actions/checkout@v4

      - name: Prepare environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android ~/.cargo
          sudo -E apt-get update -qq
          sudo -E apt-get install -y $(curl -fsSL https://tinyurl.com/ubuntu2204-build-armbian) 2>&1 | \
            grep -v "System has not been booted with systemd" | \
            grep -v "Failed to connect to system scope bus" | \
            grep -v "non-existent unit" || true
          sudo -E apt-get clean

      # ==================== 关键修复 ====================
      # 加上 continue-on-error: true，让这个 Action 返回 1 也不中断 workflow
      - name: Compile kernel
        uses: ophub/amlogic-s9xxx-armbian@main
        id: compile
        continue-on-error: true
        with:
          build_target: kernel
          kernel_source: W2215889498/unifreq-linux-6.1.y-rockchip
          kernel_version: ${{ inputs.kernel_version }}
          kernel_auto: false
          delete_source: true
          kernel_package: ${{ inputs.kernel_package }}
          kernel_sign: "-rk35xx-leegartu"
          kernel_config: kernel-config/release/rk35xx
          silent_log: false

      # always() 保证此步骤总能运行
      # 直接检查 /opt/kernel/compile-kernel/output 里有没有实际文件
      - name: Check output
        id: check
        if: always()
        run: |
          OUT="/opt/kernel/compile-kernel/output"
          
          echo "=== Compile step outcome (ignore failure): ${{ steps.compile.outcome }} ==="
          echo "=== Output files ==="
          ls -lah "$OUT" 2>/dev/null || true
          find "$OUT" -type f 2>/dev/null | head -20 || true
          
          # 判断标准：只要有实际文件，就认为编译成功
          if [ -n "$(find "$OUT" -type f 2>/dev/null | head -1)" ]; then
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "[SUCCESS] Output files verified, will proceed to release."
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "[ERROR] No output files found!"
            exit 1
          fi

      - name: Upload to Release
        if: steps.check.outputs.has_files == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: kernel_rk35xx_${{ inputs.kernel_version }}
          artifacts: "/opt/kernel/compile-kernel/output/**/*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            - Source: W2215889498/unifreq-linux-6.1.y-rockchip
            - Version: ${{ inputs.kernel_version }}
            - Package: ${{ inputs.kernel_package }}
            - For Rockchip rk3528/rk3566/rk3568 only.
